<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家登录 - 宠物之家</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 淡紫色主题色变量 */
        :root {
            --primary-light: #d4c4e8;
            --primary: #c5b0e0;
            --primary-dark: #b89ad4;
            --primary-soft: #f0eaf8;
            --primary-bg: #faf5ff;
            --primary-border: #e8ddf5;
            --text-primary: #8b6cb0;
            --text-secondary: #b8a0d0;
            --accent: #e8b4d8;
        }
        
        body {
            font-family: 'Quicksand', 'Inter', sans-serif;
            background: linear-gradient(145deg, #f3ecfa 0%, #e8ddf5 50%, #d9c8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 太阳 */
        .sun {
            position: absolute;
            top: 40px;
            right: 60px;
            font-size: 80px;
            opacity: 0.5;
            animation: sunShine 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 220, 150, 0.6));
        }
        
        @keyframes sunShine {
            0%, 100% { transform: scale(1); opacity: 0.45; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        
        /* 云朵 */
        .cloud {
            position: absolute;
            top: 60px;
            left: 40px;
            font-size: 60px;
            opacity: 0.3;
            animation: cloudFloat 12s ease-in-out infinite;
        }
        
        .cloud2 {
            position: absolute;
            top: 110px;
            right: 100px;
            font-size: 50px;
            opacity: 0.25;
            animation: cloudFloat 14s ease-in-out infinite reverse;
        }
        
        @keyframes cloudFloat {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }
        
        /* 三只小猫抱团晒太阳 */
        .cat-sunbath-1 {
            position: absolute;
            bottom: 25px;
            left: 6%;
            font-size: 90px;
            opacity: 0.5;
            filter: drop-shadow(2px 8px 12px rgba(0,0,0,0.08));
            animation: catWarm 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .cat-sunbath-2 {
            position: absolute;
            bottom: 15px;
            left: 20%;
            font-size: 80px;
            opacity: 0.48;
            filter: drop-shadow(2px 8px 12px rgba(0,0,0,0.08));
            animation: catSleep 4s ease-in-out infinite;
            cursor: pointer;
        }
        
        .cat-sunbath-3 {
            position: absolute;
            bottom: 30px;
            right: 8%;
            font-size: 85px;
            opacity: 0.5;
            filter: drop-shadow(2px 8px 12px rgba(0,0,0,0.08));
            animation: catStretch 3.5s ease-in-out infinite;
            cursor: pointer;
        }
        
        @keyframes catWarm {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(2deg); }
        }
        
        @keyframes catSleep {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.02) rotate(1deg); }
        }
        
        @keyframes catStretch {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-6px) scale(1.03); }
        }
        
        /* 草地 */
        .grass {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(180deg, transparent 0%, rgba(180, 210, 140, 0.12) 100%);
            pointer-events: none;
        }
        
        .grass::before {
            content: "🌿🌸🌼🌿";
            position: absolute;
            bottom: 8px;
            left: 12%;
            font-size: 22px;
            opacity: 0.25;
            letter-spacing: 15px;
        }
        
        .grass::after {
            content: "🌱🍃🌱";
            position: absolute;
            bottom: 0;
            right: 15%;
            font-size: 20px;
            opacity: 0.2;
            letter-spacing: 12px;
        }
        
        /* 登录框 */
        .login-container {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            width: 420px;
            padding: 48px 42px;
            box-shadow: 0 25px 45px rgba(139, 108, 176, 0.15), 0 4px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        /* 猫爪装饰 */
        .login-container::before {
            content: "🐾🐾";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            opacity: 0.6;
            letter-spacing: 8px;
        }
        
        .logo { text-align: center; margin-bottom: 35px; }
        .logo-icon { 
            font-size: 60px; 
            display: inline-block; 
            animation: pawWave 2.5s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        @keyframes pawWave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-5deg); }
        }
        
        .logo h2 { 
            font-family: 'Fredoka One', cursive;
            font-size: 32px; 
            margin-top: 14px;
            background: linear-gradient(135deg, #b89ad4, #d4a5c8, #c5b0e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(139, 108, 176, 0.1);
        }
        
        .logo p { 
            color: var(--text-secondary); 
            font-size: 13px; 
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--primary-border);
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fffef8;
            font-family: 'Quicksand', sans-serif;
        }
        .form-input:focus { 
            outline: none; 
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(197, 176, 224, 0.2);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4a5c8, #c5b0e0, #b89ad4);
            color: white;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 12px rgba(184, 154, 212, 0.3);
        }
        .btn-login:hover { 
            background: linear-gradient(135deg, #c5a0d0, #b89ad4, #a885c0);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(184, 154, 212, 0.4);
        }
        
        .error-msg { 
            color: #e8a0b0; 
            margin-top: 16px; 
            text-align: center; 
            font-size: 13px;
            background: #fff0f5;
            padding: 10px;
            border-radius: 20px;
            display: none;
        }
        .error-msg.show { display: block; }
        
        .demo-info { 
            margin-top: 28px; 
            text-align: center; 
            font-size: 12px; 
            color: var(--text-secondary);
            padding-top: 18px;
            border-top: 1.5px dashed var(--primary-border);
            font-weight: 500;
        }
        
        /* 响应式 */
        @media (max-width: 640px) {
            .cat-sunbath-1, .cat-sunbath-2, .cat-sunbath-3 { 
                font-size: 55px; 
                opacity: 0.35;
            }
            .cat-sunbath-1 { left: 2%; bottom: 10px; }
            .cat-sunbath-2 { left: 18%; bottom: 5px; }
            .cat-sunbath-3 { right: 3%; bottom: 10px; }
            .sun { font-size: 50px; top: 20px; right: 20px; }
            .login-container { width: 90%; padding: 35px 25px; }
        }
        
        @media (max-width: 480px) {
            .cat-sunbath-1, .cat-sunbath-2, .cat-sunbath-3 { display: none; }
            .login-container::before { font-size: 24px; top: -10px; }
        }
    </style>
</head>
<body>
    <!-- 太阳和云朵 -->
    <div class="sun">☀️</div>
    <div class="cloud">☁️</div>
    <div class="cloud2">☁️</div>
    
    <!-- 三只全身小猫抱团晒太阳 -->
    <div class="cat-sunbath-1">🐱‍☀️</div>
    <div class="cat-sunbath-2">😺🌞</div>
    <div class="cat-sunbath-3">🐈💤</div>
    
    <div class="grass"></div>
    
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🐾</div>
            <h2>Pet Home</h2>
            <p>🐱 商家管理后台 🐶</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>🐾 账号</label>
                <input type="text" id="account" class="form-input" placeholder="请输入账号" value="admin">
            </div>
            <div class="form-group">
                <label>🔒 密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" value="123456">
            </div>
            <button type="submit" class="btn-login">✨ 登 录 ✨</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
        
        <div class="demo-info">🐾 管理员账号：admin / 123456 🐾</div>
    </div>

    <script src="api/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const account = document.getElementById('account').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.remove('show');
            
            try {
                const result = await API.adminLogin(account, password);
                
                if (result.code === 200) {
                    localStorage.setItem('adminToken', result.data.token);
                    localStorage.setItem('adminInfo', JSON.stringify(result.data));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = result.message || '登录失败';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请确保后端服务已启动';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
